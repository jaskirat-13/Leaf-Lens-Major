services:
  - type: web
    name: leaflens-ml-api
    env: python
    pythonVersion: 3.11
    plan: free
    envVars:
      - key: PYTHON_VERSION
        value: 3.11
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --bind 0.0.0.0:$PORT api:app
    autoDeploy: true
